# DX-CI01 — Intégration continue : lint + tests + build à chaque push/PR.
# Filet de sécurité avant le déploiement Vercel.
name: CI

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  verify:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
